<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FlashAI</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap" rel="stylesheet"/>
</head>
<body>

  <h1>⚡ FlashAI</h1>
  <p class="subtitle">Paste your notes. Get flashcards instantly.</p>

  <div class="input-box">
    <textarea id="notes" placeholder="Paste your notes here..."></textarea>
    <button id="generateBtn">Generate Flashcards ✨</button>
  </div>

  <div id="status"></div>

  <div id="card-area" style="display:none;">
    <div class="card" id="flashcard">
      <div class="card-inner" id="cardInner">
        <div class="card-front" id="cardFront"></div>
        <div class="card-back" id="cardBack"></div>
      </div>
    </div>
    <div class="controls">
      <button id="prevBtn">⬅ Prev</button>
      <span id="counter">1 / 1</span>
      <button id="nextBtn">Next ➡</button>
    </div>
    <p class="hint">Click the card to flip it!</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
